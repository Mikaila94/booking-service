# ==========================================
# DEV profile ? local development only
# ==========================================

# Database ? loaded from .env file
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Print every SQL query to the console ? useful for debugging locally
spring.jpa.show-sql=true

# Log Spring framework internals ? helpful when diagnosing issues locally
logging.level.org.springframework=DEBUG

# Log your own application code at DEBUG level
logging.level.com.example.booking_service=DEBUG
