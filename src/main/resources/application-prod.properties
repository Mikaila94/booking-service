# ==========================================
# PROD profile ? production server only
# ==========================================

# Database ? injected as environment variables on the server, never stored in code
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Never log SQL queries in production ? performance cost + risk of exposing sensitive data
spring.jpa.show-sql=false

# Only log warnings and errors ? reduces noise and log storage costs
logging.level.org.springframework=WARN
logging.level.com.example.booking_service=WARN
