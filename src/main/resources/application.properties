# The name of this application. Used in logs, metrics, and monitoring tools
spring.application.name=booking-service

# Default profile when no SPRING_PROFILES_ACTIVE is set
# Always overridden in production via environment variable
spring.profiles.active=dev

# Tells Spring which JDBC driver to use to talk to the database
spring.datasource.driver-class-name=org.postgresql.Driver

# What Hibernate should do with your DB schema on startup:
# - validate: checks that the schema matches your entities, fails if not (safe for prod)
# - update: auto-updates the schema to match entities (dangerous in prod)
# - create: drops and recreates the schema every time (destroys data!)
# - none: does nothing
spring.jpa.hibernate.ddl-auto=validate
